spring.application.name=fatecads
spring.config.import=optional:file:./mail.properties

# Configurações do banco de dados 
spring.datasource.url=jdbc:postgresql://localhost:5432/fatecads_db
spring.datasource.username=postgres
spring.datasource.password=123456

# Atualiza o esquema do banco de dados automaticamente
spring.jpa.hibernate.ddl-auto=update

# Mostra as consultas SQL no console
spring.jpa.properties.hibernate.show_sql=true

# não formatar as consultas SQL
spring.jpa.properties.hibernate.format_sql=false

# configuração da porta do servidor 
server.port=8081

# Configuracao de envio de email pelo Gmail
# Use uma senha de app do Gmail em MAIL_PASSWORD, nao a senha normal da conta.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
